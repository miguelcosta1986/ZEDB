<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEDB Cinema</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-mark">Z</span>
      <div class="logo-text-group">
        <span class="logo-title">ZEDB</span>
        <span class="logo-sub">cinema</span>
      </div>
    </div>

    <div class="nav-links">
      <button class="nav-btn active" data-view="mural">Mural</button>
      <button class="nav-btn" data-view="watchlist">Ver Depois</button>
      <button class="nav-btn" data-view="stats">Estatísticas</button>
    </div>

    <div class="nav-auth" id="navAuth"></div>

  </nav>

  </nav>

  <!-- ── MAIN ── -->
  <main id="app"></main>


  <!-- ── MODAL: DRILL ── -->
  <div class="modal-overlay hidden" id="drillModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="drillTitle"></h2>
        <button class="modal-close" id="closeDrillModal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body" id="drillContent"></div>
    </div>
  </div>

  <!-- ── MODAL: SUGERIR ── -->
  <div class="modal-overlay hidden" id="suggestModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Quem sugere?</h2>
        <button class="modal-close" id="closeSuggestModal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="suggestMoviePreview"></div>
        <div class="form-group">
          <div class="suggestor-chips" id="suggestorChips"></div>
        </div>
        <div class="form-group" id="newSuggestorWrap" style="display:none">
          <label>Nome</label>
          <input type="text" id="newSuggestorInput" placeholder="ex: Avó" maxlength="30" />
        </div>
        <div class="form-actions">
          <button class="btn-primary btn-full" id="confirmSuggest">Guardar na Watchlist</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── MODAL: LOGIN ── -->
  <div class="modal-overlay hidden" id="loginModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Entrar</h2>
        <button class="modal-close" id="closeLoginModal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="o teu email" autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div id="loginError" style="color:#e05555;font-size:13px;margin-bottom:12px;display:none"></div>
          <div class="form-actions">
            <button type="submit" class="btn-primary btn-full" id="loginSubmit">Entrar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ── MODAL: ADICIONAR ── -->
  <div class="modal-overlay hidden" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Adicionar ao Mural</h2>
        <button class="modal-close" id="closeAddModal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">Cola um link do IMDB ou escreve o nome do filme/série</p>
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="https://www.imdb.com/title/tt... ou título" autocomplete="off" />
          <button class="btn-primary" id="btnSearch">Pesquisar</button>
        </div>
        <div id="searchResults"></div>
      </div>
    </div>
  </div>

  <!-- ── MODAL: DETALHE ── -->
  <div class="modal-overlay hidden" id="detailModal">
    <div class="modal modal-large">
      <button class="modal-close modal-close-detail" id="closeDetailModal">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- ── MODAL: FORM REGISTO ── -->
  <div class="modal-overlay hidden" id="registerModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="registerTitle">Registar</h2>
        <button class="modal-close" id="closeRegisterModal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="registerMoviePreview"></div>
        <form id="registerForm">
          <div class="form-group">
            <label>A tua nota <span class="label-sub">(1–10)</span></label>
            <div class="rating-row" id="ratingRow"></div>
            <div class="rating-custom-wrap">
              <span class="rating-custom-label">ou escreve:</span>
              <input type="number" id="ratingInput" min="1" max="10" step="0.1" placeholder="ex: 7.5" />
            </div>
          </div>
          <div class="form-group">
            <label>Review / Comentário <span class="label-sub">(opcional)</span></label>
            <textarea id="reviewInput" rows="3" placeholder="O que achaste?"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary btn-full">Guardar no Mural</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
